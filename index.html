<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aniversário da Núria Esperança 🎬</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #07071a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow-x: hidden;
      position: relative;
    }

    /* Ambient gradient blobs */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 50%, rgba(130, 50, 220, 0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 15%, rgba(210, 60, 60, 0.15) 0%, transparent 55%),
        radial-gradient(ellipse at 60% 85%, rgba(40, 90, 210, 0.15) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* Starfield */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--dur) ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.1; transform: scale(1); }
      to   { opacity: 0.85; transform: scale(1.4); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      background: rgba(12, 8, 28, 0.88);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 223, 91, 0.18);
      border-radius: 2rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 8px 48px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255,255,255,0.04);
      color: #fff;
      text-align: center;
      animation: slideUp 0.85s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1);    }
    }

    /* Badge */
    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #ffdf5b, #ff9f43);
      color: #1a0800;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.3rem 1rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 0.4rem;
      background: linear-gradient(135deg, #ffdf5b 0%, #ff9f43 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.65);
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    /* Ticket */
    .ticket {
      position: relative;
      background: rgba(255, 223, 91, 0.07);
      border: 1px dashed rgba(255, 223, 91, 0.3);
      border-radius: 1rem;
      padding: 1rem 1.5rem;
      margin-bottom: 0.8rem;
      display: flex;
      justify-content: space-around;
      gap: 1rem;
    }

    .ticket::before,
    .ticket::after {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      background: #07071a;
      border-radius: 50%;
      top: 50%;
      transform: translateY(-50%);
    }
    .ticket::before { left: -11px; }
    .ticket::after  { right: -11px; }

    .ticket-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }

    .ticket-icon  { font-size: 1.4rem; }
    .ticket-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.45); }
    .ticket-value { font-size: 0.85rem; font-weight: 600; color: #ffdf5b; }

    /* Copy button */
    .copy-btn {
      display: inline-block;
      background: none;
      border: 1px solid rgba(255,223,91,0.25);
      color: rgba(255,255,255,0.55);
      font-family: 'Poppins', sans-serif;
      font-size: 0.72rem;
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      cursor: pointer;
      margin-bottom: 1.4rem;
      transition: all 0.2s;
    }
    .copy-btn:hover {
      background: rgba(255,223,91,0.1);
      color: #ffdf5b;
      border-color: rgba(255,223,91,0.55);
    }

    /* Countdown */
    .countdown {
      display: flex;
      justify-content: center;
      gap: 0.7rem;
      margin-bottom: 1.8rem;
    }

    .cd-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 0.8rem;
      padding: 0.6rem 0.75rem;
      min-width: 58px;
    }

    .cd-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffdf5b;
      line-height: 1;
    }

    .cd-label {
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.45);
      margin-top: 0.25rem;
    }

    /* Form */
    .form-group {
      margin-bottom: 1rem;
      text-align: left;
    }

    label {
      display: block;
      font-size: 0.76rem;
      color: rgba(255,255,255,0.55);
      margin-bottom: 0.4rem;
      letter-spacing: 0.04em;
    }

    input,
    select {
      width: 100%;
      padding: 0.85rem 1rem;
      border-radius: 0.75rem;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 0.95rem;
      font-family: 'Poppins', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      -webkit-appearance: none;
    }

    input::placeholder { color: rgba(255,255,255,0.25); }

    input:focus,
    select:focus {
      border-color: rgba(255,223,91,0.5);
      background: rgba(255,255,255,0.09);
    }

    select option { background: #160e30; color: #fff; }

    /* Submit */
    .submit-btn {
      width: 100%;
      padding: 1rem;
      margin-top: 0.5rem;
      border-radius: 0.8rem;
      border: none;
      background: linear-gradient(135deg, #ffdf5b, #ff9f43);
      color: #1a0800;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(255,223,91,0.3);
    }

    .submit-btn:active:not(:disabled) { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.65; cursor: not-allowed; }

    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(26,8,0,0.3);
      border-top-color: #1a0800;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .submit-btn.loading .spinner   { display: block; }
    .submit-btn.loading .btn-text  { display: none; }

    /* Error */
    .error-msg {
      color: #ff8080;
      font-size: 0.8rem;
      margin-top: 0.75rem;
      display: none;
    }

    /* Success */
    .success-state {
      display: none;
      animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .success-icon { font-size: 4rem; display: block; margin-bottom: 1rem; }

    .success-state h2 {
      font-size: 1.7rem;
      background: linear-gradient(135deg, #a3ffb3, #5effa3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .success-state p {
      color: rgba(255,255,255,0.65);
      font-size: 0.9rem;
      line-height: 1.7;
    }

    /* Confetti canvas */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }

    /* Responsive */
    @media (max-width: 400px) {
      .card     { padding: 2rem 1.4rem; }
      h1        { font-size: 1.65rem; }
      .cd-value { font-size: 1.25rem; }
      .cd-item  { min-width: 48px; padding: 0.5rem 0.6rem; }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <canvas id="confetti-canvas"></canvas>

  <div class="card">
    <div class="badge">Convite Especial</div>
    <h1>🎬 Aniversário da Núria</h1>
    <p class="subtitle">A Núria Esperança faz 10 anos!<br>Junta-te a nós para uma tarde mágica no cinema 🍿</p>

    <div class="ticket">
      <div class="ticket-item">
        <span class="ticket-icon">📍</span>
        <span class="ticket-label">Local</span>
        <span class="ticket-value">NOS Almada Forum</span>
      </div>
      <div class="ticket-item">
        <span class="ticket-icon">🗓️</span>
        <span class="ticket-label">Data</span>
        <span class="ticket-value">12 Out · 15h30</span>
      </div>
    </div>

    <button class="copy-btn" id="copyBtn">📋 Copiar detalhes</button>

    <div class="countdown">
      <div class="cd-item"><span class="cd-value" id="cd-days">--</span><span class="cd-label">Dias</span></div>
      <div class="cd-item"><span class="cd-value" id="cd-hours">--</span><span class="cd-label">Horas</span></div>
      <div class="cd-item"><span class="cd-value" id="cd-mins">--</span><span class="cd-label">Min</span></div>
      <div class="cd-item"><span class="cd-value" id="cd-secs">--</span><span class="cd-label">Seg</span></div>
    </div>

    <form id="rsvpForm">
      <div class="form-group">
        <label for="nome">O teu nome *</label>
        <input type="text" id="nome" placeholder="Ex: Maria Silva" required />
      </div>
      <div class="form-group">
        <label for="telefone">Telemóvel (opcional)</label>
        <input type="tel" id="telefone" placeholder="Ex: 912 345 678" />
      </div>
      <div class="form-group">
        <label for="presenca">Vais à festa? *</label>
        <select id="presenca" required>
          <option value="">Seleciona uma opção</option>
          <option value="Sim">Sim! Mal posso esperar 🎬</option>
          <option value="Não">Infelizmente não 😢</option>
        </select>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">
        <div class="spinner"></div>
        <span class="btn-text">Confirmar Presença 🎉</span>
      </button>
      <p class="error-msg" id="errorMsg"></p>
    </form>

    <div class="success-state" id="successState">
      <span class="success-icon">🎉</span>
      <h2>Obrigado!</h2>
      <p>A tua resposta foi registada com sucesso.<br>Até dia 12 de Outubro! 🎬🍿</p>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwd4-Qph-DpVJpMq8iwwXX0kYLbn3EPvM7ECe8Dn8GTteVA3WEBRpBvWIWB8Pf0gcYB/exec";

    // Starfield
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 130; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2.4 + 0.5;
      s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${(Math.random()*3+2).toFixed(1)}s;animation-delay:${(Math.random()*5).toFixed(1)}s`;
      starsEl.appendChild(s);
    }

    // Countdown — next Oct 12 at 15:30
    function nextEventDate() {
      const now = new Date();
      let year = now.getFullYear();
      const candidate = new Date(year, 9, 12, 15, 30, 0);
      if (candidate <= now) candidate.setFullYear(year + 1);
      return candidate;
    }

    const eventDate = nextEventDate();

    function updateCountdown() {
      const diff = eventDate - new Date();
      if (diff <= 0) {
        document.querySelector('.countdown').innerHTML =
          '<p style="color:#ffdf5b;font-weight:600;font-size:1rem;">Hoje é o grande dia! 🎉</p>';
        return;
      }
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      document.getElementById('cd-days').textContent  = String(d).padStart(2, '0');
      document.getElementById('cd-hours').textContent = String(h).padStart(2, '0');
      document.getElementById('cd-mins').textContent  = String(m).padStart(2, '0');
      document.getElementById('cd-secs').textContent  = String(s).padStart(2, '0');
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);

    // Copy details
    document.getElementById('copyBtn').addEventListener('click', () => {
      const text = '🎉 Aniversário da Núria Esperança\n📍 Cinema NOS – Almada Forum\n🗓️ 12 de Outubro às 15h30';
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = '✅ Copiado!';
        setTimeout(() => { btn.textContent = '📋 Copiar detalhes'; }, 2000);
      });
    });

    // Confetti
    function launchConfetti() {
      const canvas = document.getElementById('confetti-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;

      const colors = ['#ffdf5b','#ff9f43','#a3ffb3','#7b8cde','#ff6b9d','#ffffff','#ff4757'];
      const pieces = Array.from({ length: 160 }, () => ({
        x: Math.random() * canvas.width,
        y: -12,
        r: Math.random() * 7 + 3,
        color: colors[Math.floor(Math.random() * colors.length)],
        speed: Math.random() * 3 + 2,
        angle: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 0.18,
        wAngle: Math.random() * Math.PI * 2,
        wSpeed: Math.random() * 0.09 + 0.04,
      }));

      let frame = 0;
      (function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = false;
        pieces.forEach(p => {
          p.y += p.speed;
          p.wAngle += p.wSpeed;
          p.x += Math.sin(p.wAngle) * 1.5;
          p.angle += p.spin;
          if (p.y < canvas.height + 20) alive = true;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.angle);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.45);
          ctx.restore();
        });
        frame++;
        if (alive && frame < 320) requestAnimationFrame(draw);
        else ctx.clearRect(0, 0, canvas.width, canvas.height);
      })();
    }

    // Form submit
    const form      = document.getElementById('rsvpForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg  = document.getElementById('errorMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const nome     = document.getElementById('nome').value.trim();
      const telefone = document.getElementById('telefone').value.trim();
      const presenca = document.getElementById('presenca').value;

      if (!nome || !presenca) {
        errorMsg.textContent = 'Por favor, preenche todos os campos obrigatórios.';
        errorMsg.style.display = 'block';
        return;
      }

      errorMsg.style.display = 'none';
      submitBtn.classList.add('loading');
      submitBtn.disabled = true;

      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nome, telefone, presenca }),
        });
        form.style.display = 'none';
        document.getElementById('successState').style.display = 'block';
        if (presenca === 'Sim') launchConfetti();
      } catch {
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
        errorMsg.textContent = 'Erro ao enviar, tenta novamente 😕';
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
